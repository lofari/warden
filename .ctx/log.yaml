      task: "[review] Timeout uses SIGKILL instead of graceful SIGTERM + grace period"
      outcome: done
      summary: >
        Fixed timeout handling to match design spec. Replaced exec.CommandContext (which sends
        SIGKILL to docker client on deadline) with exec.Command + manual lifecycle management.
        On timeout, a watchdog goroutine now runs `docker stop --time 10` which sends SIGTERM,
        waits 10s grace period, then SIGKILL — matching the design doc specification. Uses
        cmd.Start()/cmd.Wait() instead of cmd.Run() for explicit process control. All 22 unit
        tests pass, go vet clean, build succeeds.
      files_changed:
          - internal/container/run.go
