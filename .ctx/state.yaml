pitfalls:
    - what: .gitignore pattern 'warden' matches cmd/warden directory
      fix: Use '/warden' (leading slash) to only match the root-level binary
    - what: Implementation plan test code accesses ProfileEntry.Image as string but it's *string
      fix: 'Use nil check + dereference: file.Default.Image == nil || *file.Default.Image != expected'
    - what: container.Run() originally called CheckDockerReady() before checking DryRun
      fix: Moved dry-run check before Docker readiness check so --dry-run works without Docker daemon
    - what: Go not installed in sandbox environment, PATH is empty
      fix: 'Install Go to /tmp/go-sdk and use: export PATH=/tmp/go-sdk/go/bin:$PATH GOPATH=/tmp/gopath GOCACHE=/tmp/go-cache'
