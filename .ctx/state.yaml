project:
    name: warden
    summary: "Secure sandbox CLI for running AI coding agents in isolated Docker containers"
    stack: "Go, Cobra, Docker CLI, go:embed"
    docs_path: docs/plans/
status:
    current_focus: "Sandbox tooling — agent-ready base images and enhanced feature scripts"
    phase: building
    last_session: "2026-03-05"
decisions:
    - what: "Go instead of Kotlin"
      why: "Consistent with golem, native binaries trivially, no JVM/GraalVM needed"
      when: "2026-03-03"
    - what: "Shell out to docker CLI, not Docker Engine API"
      why: "Dramatically simpler, predictable, debuggable. TTY passthrough is trivial."
      when: "2026-03-03"
    - what: "Feature scripts for tool install, not devcontainers"
      why: "Ephemeral runs don't fit devcontainer model, avoids Node.js dependency"
      when: "2026-03-03"
    - what: "Same-path mounts (host path = container path)"
      why: "Agent sees real paths, sandbox is invisible"
      when: "2026-03-03"
    - what: "Network on/off only for v1"
      why: "Simple, domain filtering can be added later without API changes"
      when: "2026-03-03"
    - what: ".warden.yaml in project root"
      why: "Convention over configuration, no central config needed"
      when: "2026-03-03"
    - what: "Golem integration is external (golem calls warden)"
      why: "Clean separation of concerns, no coupling"
      when: "2026-03-03"
locked: []
tasks:
    - name: "Task 1: Project Scaffold and CLI Skeleton"
      status: done
      notes: "go mod init, main.go, cobra root + run subcommand stub. All tests pass."
    - name: "Task 2: Config Types, Defaults, and YAML Parsing"
      status: done
      depends_on: ["Task 1: Project Scaffold and CLI Skeleton"]
      notes: "SandboxConfig types, DefaultConfig(), ParseWardenYAML(). ProfileEntry uses pointer fields for optional merge semantics. All tests pass."
    - name: "Task 3: Config Merging"
      status: done
      depends_on: ["Task 2: Config Types, Defaults, and YAML Parsing"]
      notes: "ApplyProfile() overlays pointer fields onto SandboxConfig. ResolveProfile() resolves default -> parent -> named with extends chains. 4 tests pass."
    - name: "Task 4: Mount Resolution and Docker Argument Builder"
      status: done
      depends_on: ["Task 2: Config Types, Defaults, and YAML Parsing"]
      notes: "ResolveMounts() resolves relative paths to absolute, validates existence. BuildDockerArgs() builds docker run CLI args from SandboxConfig. 5 tests pass."
    - name: "Task 5: Docker Prerequisite Check and Image Builder"
      status: done
      depends_on: ["Task 4: Mount Resolution and Docker Argument Builder"]
      notes: "DockerBinaryPath(), CheckDockerReady(), feature scripts (node/python/go/rust/java) embedded via go:embed, ImageTag(), ImageExists(), BuildImage(). 8 new tests, all 15 project tests pass."
    - name: "Task 6: Container Execution with TTY, Signals, Timeout, and Exit Codes"
      status: done
      depends_on: ["Task 4: Mount Resolution and Docker Argument Builder", "Task 5: Docker Prerequisite Check and Image Builder"]
      notes: "ParseTimeout(), ExitCodeMessage(), ContainerName(), Run() with TTY detection, signal forwarding, timeout via context, exit code translation. 3 new tests, all 18 project tests pass."
    - name: "Task 7: CLI Wiring"
      status: done
      depends_on: ["Task 3: Config Merging", "Task 6: Container Execution with TTY, Signals, Timeout, and Exit Codes"]
      notes: "Full flag wiring: mount, network, memory, cpus, timeout, image, profile, workdir, tools, dry-run. Loads .warden.yaml, resolves profile, applies CLI overrides, resolves mounts, delegates to container.Run(). Moved dry-run before Docker check. 1 new test, all 19 project tests pass."
    - name: "Task 8: warden init and warden images Commands"
      status: done
      depends_on: ["Task 7: CLI Wiring"]
      notes: "TDD: wrote tests first. init generates .warden.yaml with overwrite guard. images lists/prunes cached warden images with prune subcommand. 3 new tests, all 22 project tests pass."
    - name: "Task 9: Integration Tests"
      status: done
      depends_on: ["Task 8: warden init and warden images Commands"]
      notes: "6 integration tests behind //go:build integration tag: echo command, read-only mount, no-network blocking, exit code propagation, dry-run output, timeout. Compile-verified with go vet -tags integration. Docker not available in CI-like env so runtime tested via dry-run path."
    - name: "[review] Timeout uses SIGKILL instead of graceful SIGTERM + grace period"
      status: done
      notes: >
        Fixed: replaced exec.CommandContext (immediate SIGKILL) with exec.Command + manual watchdog
        goroutine. On timeout, runs `docker stop --time 10` which sends SIGTERM, waits 10s grace
        period, then SIGKILL. Uses cmd.Start()/cmd.Wait() instead of cmd.Run() for lifecycle control.
        All 22 unit tests pass, go vet clean.
pitfalls:
