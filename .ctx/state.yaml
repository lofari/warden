project:
    name: warden
    summary: "Secure sandbox CLI for running AI coding agents in isolated Docker containers"
    stack: "Go, Cobra, Docker CLI, go:embed"
    docs_path: docs/plans/
status:
    current_focus: "Planning complete, ready for implementation"
    phase: building
    last_session: "2026-03-03"
decisions:
    - what: "Go instead of Kotlin"
      why: "Consistent with golem, native binaries trivially, no JVM/GraalVM needed"
      when: "2026-03-03"
    - what: "Shell out to docker CLI, not Docker Engine API"
      why: "Dramatically simpler, predictable, debuggable. TTY passthrough is trivial."
      when: "2026-03-03"
    - what: "Feature scripts for tool install, not devcontainers"
      why: "Ephemeral runs don't fit devcontainer model, avoids Node.js dependency"
      when: "2026-03-03"
    - what: "Same-path mounts (host path = container path)"
      why: "Agent sees real paths, sandbox is invisible"
      when: "2026-03-03"
    - what: "Network on/off only for v1"
      why: "Simple, domain filtering can be added later without API changes"
      when: "2026-03-03"
    - what: ".warden.yaml in project root"
      why: "Convention over configuration, no central config needed"
      when: "2026-03-03"
    - what: "Golem integration is external (golem calls warden)"
      why: "Clean separation of concerns, no coupling"
      when: "2026-03-03"
